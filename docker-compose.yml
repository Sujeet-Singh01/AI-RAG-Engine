services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pgvector-store
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Removed POSTGRES_DB. It will default to a DB named "postgres"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: